<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cla Photo Booth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📸 FunHouse</h1>
        <div class="camera-area">
            <video id="video" autoplay playsinline muted></video>
            <div id="countdown"></div>
        </div>
        <div class="controls">
            <select id="filter">
                <option value="none">Normal</option>
                <option value="grayscale(100%)">B&W</option>
                <option value="sepia(100%)">Vintage</option>
                <option value="hue-rotate(40deg)">Pink</option>
            </select>
            <button id="flipBtn">Flip Camera</button>
            <button id="captureBtn">Take Strip</button>
            <button id="downloadBtn">Save</button>
        </div>
        <canvas id="canvas"></canvas>
    </div>
    <script src="script.js"></script>
</body>
</html>
