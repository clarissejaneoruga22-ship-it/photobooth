<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FunHouse Photo Booth</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>📸 FunHouse Photo Booth</h1>

<div class="camera-area">

<video id="video" autoplay playsinline></video>

<div id="countdown"></div>

</div>

<div class="controls">

<select id="filter">

<option value="none">Normal</option>
<option value="grayscale(100%)">Black & White</option>
<option value="sepia(100%)">Vintage</option>
<option value="brightness(120%)">Bright</option>
<option value="contrast(130%)">Contrast</option>
<option value="hue-rotate(40deg)">Pink</option>

</select>

<button id="captureBtn">
Take Photo Strip
</button>

<button id="downloadBtn">
Download
</button>

</div>

<canvas id="canvas" width="420" height="1100"></canvas>

</div>

<script src="script.js"></script>

</body>

</html>
